name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64

      - name: Lint
        run: |
          pip -q install pre-commit
          pre-commit run --all-files

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install Cryptography (but not for pypy on windows)
        if: ${{ !((matrix.os == 'windows-latest') && (matrix.python-version == 'pypy3.9')) }}
        run: |
          pip install cryptography

      - name: Run Tests
        run: |
          pip install '.[test]'
          pytest

      - name: Build Project
        run: |
          pip install '.[build]'
          python -m build --wheel --sdist
          twine check dist/*

      - name: Upload dist artifacts (for PyPI publish)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12' }}
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  docs:
    name: Build docs (GitHub Pages)
    runs-on: ubuntu-latest
    # Only publish on tag; still builds on PRs for testing
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package + docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[docs]'

      - name: Build Sphinx HTML
        run: |
          python -m sphinx -b html docs docs/_build/html

      - name: Upload Pages artifact
        # Upload even on PRs for testing, the deployment job below is gated to main only.
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: docs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  publish_pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    if: startsWith(github.ref, 'refs/tags')
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
