stages:
  - Lint
  - Test
  - Build

default:
  tags:
  - kubernetes

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - when: always

#######################################
# Template Jobs
#######################################
.Matrix:
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  image:
    name: python:${PYTHON_VERSION}
    entrypoint: [""]

#######################################
# Lint Jobs
#######################################
Lint:
  extends: .Matrix
  stage: Lint
  script:
    - pip -q install pre-commit
    - pre-commit run --all-files

#######################################
# Test Jobs
#######################################
PyTest:
  extends: .Matrix
  stage: Test
  script:
    - python -m pip install --upgrade pip
    - pip install '.[test]'
    - pytest
  coverage: /TOTAL.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

#######################################
# Build Jobs
#######################################
Build:
  extends: .Matrix
  stage: Build
  script:
    - pip install '.[build]'
    - python -m build --wheel --sdist
    - twine check dist/*
  artifacts:
    paths:
      - dist/*

Build Documentation:
  stage: Build
  image:
    name: sphinxdoc/sphinx-latexpdf:8.2.3
  script:
    - pip install '.[docs]'
    - cd docs && make html
  artifacts:
    paths:
      - docs/_build/html
